let stream=null,isScanning=false,scanInterval=null;
let recentSearches=JSON.parse(localStorage.getItem('sctr_recent')||'[]');

window.addEventListener('DOMContentLoaded',()=>{
    updateStats();
    renderRecent();
    startScanner();
    document.getElementById('dniInput').addEventListener('keypress',e=>{if(e.key==='Enter')searchManual()});
    if('serviceWorker'in navigator){
        const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
        navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
    }
});

function updateStats(){
    document.getElementById('statTotal').textContent=DB.length;
    let v=DB.filter(r=>{let d=parseInt(r.di||0);return d>0;}).length;
    document.getElementById('statVigentes').textContent=v;
}

function switchTab(tab){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab'+tab[0].toUpperCase()+tab.slice(1)).classList.add('active');
    document.getElementById('scannerContainer').classList.toggle('active',tab==='scanner');
    document.getElementById('manualContainer').classList.toggle('active',tab==='manual');
    if(tab==='scanner')startScanner();else{stopScanner();document.getElementById('dniInput').focus();}
}

async function startScanner(){
    if(isScanning)return;
    let video=document.getElementById('video');
    try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
        video.srcObject=stream;
        isScanning=true;
        scanInterval=setInterval(()=>{if(isScanning)detectBarcode();},500);
    }catch(err){
        showAlert('No se pudo acceder a la cámara. Use el modo manual.','error');
        switchTab('manual');
    }
}

function stopScanner(){
    isScanning=false;
    if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    document.getElementById('video').srcObject=null;
}

function toggleFlash(){
    if(!stream)return;
    let track=stream.getVideoTracks()[0];
    if(track&&'torch'in track.getCapabilities()){
        track.applyConstraints({advanced:[{torch:!track.getConstraints().torch}]}).catch(()=>{});
    }
}

function detectBarcode(){
    let video=document.getElementById('video'),canvas=document.getElementById('canvas');
    if(!video.videoWidth)return;
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    let ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);
    let w=canvas.width,h=canvas.height,cx=w*0.5,cy=h*0.5,rw=w*0.6,rh=h*0.3;
    let imgData=ctx.getImageData(cx-rw/2,cy-rh/2,rw,rh),data=imgData.data;
    let transitions=0,lastBright=0,threshold=100,sampleRow=Math.floor(rh/2);
    for(let x=0;x<rw;x+=2){
        let idx=(sampleRow*rw+x)*4,brightness=(data[idx]+data[idx+1]+data[idx+2])/3;
        if((brightness>threshold&&lastBright<=threshold)||(brightness<=threshold&&lastBright>threshold))transitions++;
        lastBright=brightness;
    }
    if(transitions>30){
        let numbers=extractNumbers(ctx,cx-rw/2,cy-rh/2,rw,rh);
        if(numbers&&numbers.length>=8){stopScanner();performSearch(numbers);}
    }
}

function extractNumbers(ctx,x,y,w,h){
    let imgData=ctx.getImageData(x,y,w,h),data=imgData.data,candidates=[];
    for(let row=Math.floor(h*0.3);row<h*0.7;row+=5){
        let seq='',barCount=0,inBar=false;
        for(let col=0;col<w;col++){
            let idx=(row*w+col)*4,brightness=(data[idx]+data[idx+1]+data[idx+2])/3,isDark=brightness<120;
            if(isDark&&!inBar){inBar=true;barCount=1;}
            else if(isDark&&inBar)barCount++;
            else if(!isDark&&inBar){if(barCount>3&&barCount<15)seq+='1';else if(barCount>=15)seq+='0';inBar=false;}
        }
        let m=seq.match(/\d{8,}/);if(m)candidates.push(m[0]);
    }
    if(!candidates.length)return null;
    let counts={},best=candidates[0],bestCount=0;
    for(let c of candidates){counts[c]=(counts[c]||0)+1;if(counts[c]>bestCount){bestCount=counts[c];best=c;}}
    return best;
}

function searchManual(){
    let dni=document.getElementById('dniInput').value.trim();
    if(!dni){showAlert('Ingrese un número de documento','error');return;}
    performSearch(dni);
}

function performSearch(query){
    showLoading(true);
    query=query.replace(/\D/g,'');
    setTimeout(()=>{
        showLoading(false);
        let results=DB.filter(r=>r.d&&r.d.replace(/\D/g,'').includes(query));
        if(!results.length){showAlert('No se encontró registro con el documento: '+query,'error');showResults(null);return;}
        let record=results[0];showResults(record);addToRecent(record);
    },600);
}

function showResults(record){
    let section=document.getElementById('resultsSection'),card=document.getElementById('resultCard'),header=document.getElementById('resultHeader'),body=document.getElementById('resultBody');
    if(!record){section.classList.remove('active');return;}
    section.classList.add('active');
    let dias=parseInt(record.di||0),statusClass,statusText,daysText,daysLabel;
    if(!record.di||record.di===''){statusClass='sin-datos';statusText='SIN DATOS';daysText='--';daysLabel='vigencia no registrada';}
    else if(dias>15){statusClass='vigente';statusText='VIGENTE';daysText=dias.toString();daysLabel='días restantes';}
    else if(dias>0){statusClass='por-vencer';statusText='POR VENCER';daysText=dias.toString();daysLabel='días restantes';}
    else if(dias===0){statusClass='por-vencer';statusText='VENCE HOY';daysText='0';daysLabel='días restantes';}
    else{statusClass='vencido';statusText='VENCIDO';daysText=Math.abs(dias).toString();daysLabel='días vencidos';}
    header.className='result-header '+statusClass;
    document.getElementById('resultStatus').textContent=statusText;
    document.getElementById('resultDays').textContent=daysText;
    document.getElementById('resultDaysLabel').textContent=daysLabel;
    let fields=[['Documento',(record.td||'DNI')+': '+(record.d||'-'),true],['Apellidos',record.a||'-',false],['Nombres',record.n||'-',false],['Puesto',record.p||'-',false],['Tipo Proveedor',record.tp||'-',false],['Motivo Ingreso',record.m||'-',false],['Área / Lugar',[record.l1,record.l2,record.l3].filter(Boolean).join(' · ')||'-',false],['Razón Social',record.rz||'-',true],['RUC',record.ru||'-',false],['Vigencia SCTR',record.v||'-',true],['Días Restantes',record.di||'-',true],['Inicio SCTR',record.is?fmtDate(record.is):'-',false],['Fin SCTR',record.fsctr?fmtDate(record.fsctr):'-',false],['Correo Solicitante',record.co||'-',false],['Celular Empresa',record.ce||'-',false],['Tipo Vehículo',record.tv||'-',false],['Placa',record.pl||'-',false]];
    body.innerHTML=fields.map(([l,v,h])=>`<div class="info-row"><span class="info-label">${l}</span><span class="info-value ${h?'highlight':''}">${v}</span></div>`).join('');
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function fmtDate(serial){
    if(!serial||isNaN(serial))return serial;
    let d=new Date((parseInt(serial)-25569)*86400*1000);
    if(isNaN(d.getTime()))return serial;
    return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function addToRecent(record){
    let entry={d:record.d,n:record.n,a:record.a,di:record.di,t:Date.now()};
    recentSearches=[entry,...recentSearches.filter(r=>r.d!==record.d)].slice(0,10);
    localStorage.setItem('sctr_recent',JSON.stringify(recentSearches));
    renderRecent();
}

function renderRecent(){
    let container=document.getElementById('recentList');
    if(!recentSearches.length){container.innerHTML='<span style="color:#999;font-size:0.85rem">No hay consultas recientes</span>';return;}
    container.innerHTML=recentSearches.map(r=>{
        let d=parseInt(r.di||0),sc='vigente';
        if(d<=0&&r.di!=='')sc='vencido';else if(d>0&&d<=15)sc='por-vencer';else if(!r.di||r.di==='')sc='sin-datos';
        return `<span class="recent-chip" onclick="performSearch('${r.d}')"><span class="chip-status ${sc}"></span><strong>${r.d}</strong> · ${r.a}, ${r.n}</span>`;
    }).join('');
}

function clearRecent(){recentSearches=[];localStorage.removeItem('sctr_recent');renderRecent();}
function clearResults(){document.getElementById('resultsSection').classList.remove('active');document.getElementById('dniInput').value='';document.getElementById('alertContainer').innerHTML='';}
function showLoading(show){document.getElementById('loadingOverlay').classList.toggle('active',show);}
function showAlert(message,type){let container=document.getElementById('alertContainer'),div=document.createElement('div');div.className='alert alert-'+type;div.innerHTML=(type==='error'?'⚠️ ':'ℹ️ ')+message;container.appendChild(div);setTimeout(()=>div.remove(),5000);}
function showModal(icon,title,text){document.getElementById('modalIcon').textContent=icon;document.getElementById('modalTitle').textContent=title;document.getElementById('modalText').textContent=text;document.getElementById('modalOverlay').classList.add('active');}
function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('active');}
let lastTouch=0;
document.addEventListener('touchend',e=>{let now=Date.now();if(now-lastTouch<300)e.preventDefault();lastTouch=now;},{passive:false});

</script>
